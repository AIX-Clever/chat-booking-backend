# Queries
type Query {
  # Catalog
  listCategories(activeOnly: Boolean): [Category!]!   
  searchServices(text: String, availableOnly: Boolean): [Service!]!   
  getService(serviceId: ID!): Service   
  listProviders: [Provider!]!   
  listProvidersByService(serviceId: ID!): [Provider!]!   

  listRooms: [Room!]!  
  getRoom(roomId: ID!): Room  
  
  # Availability
  getAvailableSlots(input: GetAvailableSlotsInput!): [TimeSlot!]!   
  getProviderAvailability(providerId: ID!): [ProviderAvailability!]!  
  
  # Bookings
  getBooking(input: GetBookingInput!): Booking  
  listBookingsByProvider(input: ListBookingsByProviderInput!): [Booking!]! 
  listBookingsByClient(input: ListBookingsByClientInput!): [Booking!]! 
  getBookingByConversation(input: GetBookingByConversationInput!): Booking   
  
  # Chat
  getConversation(input: GetConversationInput!): Conversation   
  getTenant(tenantId: ID): Tenant   
  listFAQs: [FAQ!]!   
  
  # Workflow (Admin)
  listWorkflows: [Workflow!]! 
  getWorkflow(workflowId: ID!): Workflow 

  # Dashboard Metrics (Admin)
  getDashboardMetrics: DashboardMetrics 
  getPlanUsage: PlanUsage 

  # User Management (Admin)
  listTenantUsers: [TenantUser!]! 
  getTenantUser(userId: ID!): TenantUser 

  # API Keys (Admin)
  listApiKeys: [ApiKey!]! 

  # Billing (Admin)
  # Billing (Admin)
  listInvoices: [Invoice!]! 
  getInvoiceDownloadUrl(invoiceId: ID!): String!

  # Public Profile (Microsites)
  getTenantPublicProfile(slug: String!): PublicProfile  

  # Public Link Status (Admin)
  getPublicLinkStatus(providerId: String): PublicLinkStatus 

  # Payment Reconciliation
  checkPaymentStatus(tenantId: ID!): PaymentStatusResponse 

  # Client Management (Client File)
  getClient(clientId: ID!): Client 
  listClients: [Client!]! 
  listClientAuditLogs(clientId: ID!): [ClientAuditLog!]! 
}

type PaymentStatusResponse  {
  status: String!
  message: String
}

type PublicProfile    {
  tenantId: ID!
  name: String!
  slug: String!
  bio: String
  photoUrl: String
  themeColor: String
  primaryServiceId: String
  services: [Service]
  profession: String
  specializations: [String]
  operatingHours: String
  fullAddress: String
  providers: [Provider]
  tenantPlan: String
  isPublished: Boolean
}

# Public Link Status for Admin Panel
type ChecklistItem  {
  item: String!
  status: ChecklistStatus!
  label: String!
  isRequired: Boolean!
  actionUrl: String
}

enum ChecklistStatus {
  COMPLETE
  MISSING
  RECOMMENDED
}

type PublicLinkStatus  {
  isPublished: Boolean!
  publishedAt: AWSDateTime
  slug: String
  publicUrl: String
  completenessChecklist: [ChecklistItem!]!
  completenessPercentage: Int!
}

type PublicLinkStatusResponse  {
  success: Boolean!
  isPublished: Boolean!
  publishedAt: AWSDateTime
  message: String
}

# Mutations
type Mutation {
  # Tenant (Public/Auth)
  registerTenant(input: RegisterTenantInput!): Tenant  
  updateTenant(input: UpdateTenantInput!): Tenant! 

  # Catalog (Admin)
  createCategory(input: CreateCategoryInput!): Category! 
  updateCategory(input: UpdateCategoryInput!): Category! 
  deleteCategory(categoryId: ID!): Category! 

  generatePresignedUrl(fileName: String!, contentType: String!): String! 

  createService(input: CreateServiceInput!): Service! 
  updateService(input: UpdateServiceInput!): Service! 
  deleteService(serviceId: ID!): Service! 
  
  createProvider(input: CreateProviderInput!): Provider! 
  updateProvider(input: UpdateProviderInput!): Provider! 
  deleteProvider(providerId: ID!): Provider! 

  createRoom(input: CreateRoomInput!): Room! 
  updateRoom(input: UpdateRoomInput!): Room! 
  deleteRoom(roomId: ID!): Room! 
  
  # Availability (Admin)
  setProviderAvailability(input: SetAvailabilityInput!): ProviderAvailability! 
  setProviderExceptions(input: SetExceptionsInput!): ProviderExceptions! 
  
  # FAQs (Admin)
  createFAQ(input: CreateFAQInput!): FAQ! 
  updateFAQ(input: UpdateFAQInput!): FAQ! 
  deleteFAQ(faqId: ID!): FAQ! 

  # Workflows (Admin)
  createWorkflow(input: CreateWorkflowInput!): Workflow! 
  updateWorkflow(input: UpdateWorkflowInput!): Workflow! 
  deleteWorkflow(workflowId: ID!): Workflow! 

  # Documents (Knowledge Base)
  getUploadUrl(fileName: String!, contentType: String!): String! 

  # Bookings
  createBooking(input: CreateBookingInput!): Booking!   
  confirmBooking(input: ConfirmBookingInput!): Booking! 
  cancelBooking(input: CancelBookingInput!): Booking! 
  markAsNoShow(bookingId: ID!): Booking! 
  updateBookingStatus(bookingId: ID!, status: String!): Booking! 
  
  # User Management (Admin)
  inviteUser(input: InviteUserInput!): TenantUser! 
  updateUserRole(input: UpdateUserRoleInput!): TenantUser! 
  removeUser(userId: ID!): TenantUser! 
  resetUserPassword(userId: ID!): Boolean 
  
  # API Keys
  createApiKey(name: String): ApiKey! 
  revokeApiKey(apiKeyId: ID!): ApiKey! 

  # Subscription Mutations
  subscribe(planId: String!, email: String, backUrl: String, paymentMethod: String): SubscriptionResponse! 
  downgrade(targetPlan: String!, subscriptionId: String!): DowngradeResponse! 

  # Chat
  startConversation(input: StartConversationInput!): ChatResponse!   
  sendMessage(input: SendMessageInput!): ChatResponse!   
  confirmBookingFromConversation(input: ConfirmBookingFromConversationInput!): ChatResponse!   
  
  # User Management
  resendUserPasswordReset(userId: ID!): Boolean! 
  resendInvitation(userId: ID!): Boolean! 

  # Support
  createSupportIssue(input: SupportIssueInput!): Boolean! 

  # Public Link Status (Admin)
  setPublicLinkStatus(isPublished: Boolean!): PublicLinkStatusResponse! 

  # Client Management
  createClient(input: CreateClientInput!): Client! 
  updateClient(input: UpdateClientInput!): Client! 
}

input ExceptionRuleInput {
  date: String!
  timeRanges: [TimeRangeInput!]!
}

input SetExceptionsInput {
  providerId: ID!
  exceptions: [ExceptionRuleInput!]!
}

type ProviderExceptions  {
  providerId: ID!
  exceptions: [ExceptionRule!]!
}

