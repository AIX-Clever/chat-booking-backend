  metadata: AWSJSON
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Message    {
  role: String!
  content: String!
  timestamp: String!
  metadata: AWSJSON
}

type ChatResponse    {
  conversation: Conversation!
