
# Scalars
scalar AWSDateTime
scalar AWSJSON

# Enums
enum BookingStatus {
  PENDING
  CONFIRMED
  CANCELLED
  NO_SHOW
}

enum PaymentStatus {
  NONE
  PENDING
  PAID
  FAILED
}

type SubscriptionResponse  {
  subscriptionId: String!
  initPoint: String!
  message: String
}

type DowngradeResponse  {
  message: String!
  effectiveDate: String!
}

enum ConversationState {
  INIT
  SERVICE_PENDING
  SERVICE_SELECTED
  PROVIDER_PENDING
  PROVIDER_SELECTED
  SLOT_PENDING
  CONFIRM_PENDING
  BOOKING_CONFIRMED
}

enum LocationType {
  ONLINE
  PHYSICAL
}

# Types - Tenant
type Room    {
  roomId: ID!
  tenantId: ID!
  name: String!
  description: String
  capacity: Int!
  status: String!
  isVirtual: Boolean
  minDuration: Int
  maxDuration: Int
  operatingHours: AWSJSON
  metadata: AWSJSON
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

enum TenantStatus {
  ACTIVE
  SUSPENDED
  CANCELLED
  TRIAL
  PENDING_PAYMENT
}

enum TenantPlan {
  LITE
  PRO
  BUSINESS
  ENTERPRISE
}

type Tenant    {
  tenantId: ID!
  name: String!
  slug: String
  status: TenantStatus!
  plan: TenantPlan!
  ownerUserId: String!
  billingEmail: String!
  settings: AWSJSON
  services: [Service]
  isPublished: Boolean
  publishedAt: AWSDateTime
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ApiKey  {
  apiKeyId: ID!
  tenantId: ID!
  name: String
  keyPreview: String
  status: String!

  createdAt: AWSDateTime!
  lastUsedAt: AWSDateTime
  apiKey: String # Only populated on creation
}

# User Management Types
type TenantUser  {
  userId: ID!
