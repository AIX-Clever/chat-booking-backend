  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Workflow  {
  workflowId: ID!
  tenantId: ID!
  name: String!
  description: String
  steps: AWSJSON!
  metadata: AWSJSON
  isActive: Boolean!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# Types - Dashboard Metrics
type DashboardSummary  {
  revenue: Float!
  bookings: Int!
  messages: Int!
  tokensIA: Int!
  conversionsChat: Int!
  aiResponses: Int!
