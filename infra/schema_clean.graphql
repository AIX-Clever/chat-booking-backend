}

type TopService  {
  serviceId: ID!
  name: String!
  bookings: Int!
}

type TopProvider  {
  providerId: ID!
  name: String!
  bookings: Int!
}

type BookingStatusCounts  {
  CONFIRMED: Int!
  PENDING: Int!
  CANCELLED: Int!
