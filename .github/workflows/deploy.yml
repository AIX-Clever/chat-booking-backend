name: Deploy Backend

on:
  push:
    branches:
      - dev
      - qa
      - stg
      - prod
  pull_request:
    branches:
      - dev
      - qa
      - stg
      - prod
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Test Dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run Linters
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Unit Tests
        run: |
          pytest tests/ -v || echo "Tests failed but proceeding for now (Soft Gate)"

      - name: Validate GraphQL Schema (Retrocompatibility)
        run: |
          git show HEAD~1:infra/schema.graphql > infra/schema_old.graphql || echo "" > infra/schema_old.graphql

          if [ -s infra/schema_old.graphql ]; then
            python3 scripts/validate_schema_diff.py infra/schema_old.graphql infra/schema.graphql || {
              echo "::error::GraphQL Schema introduced BREAKING CHANGES."
              exit 1
            }
          else
            echo "Skipping check: Could not find previous schema version."
          fi

  deploy:
    needs: [validate]
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate Layer Sync
        run: |
          LOCAL_HASH=$(python3 scripts/validate_shared.py shared | tr -d '[:space:]')
          
          # Retrieve values from SSM (shared from layers repository)
          LAYER_ARN=$(aws ssm get-parameter --name /chatbooking/layers/python-layer-arn --query 'Parameter.Value' --output text --region ${{ secrets.AWS_REGION }} 2>/dev/null) || true
          EXPECTED_HASH=$(aws ssm get-parameter --name /chatbooking/layers/python-layer-hash --query 'Parameter.Value' --output text --region ${{ secrets.AWS_REGION }} 2>/dev/null) || true
          EXPECTED_HASH=$(echo $EXPECTED_HASH | tr -d '[:space:]')
          
          if [ -z "$LAYER_ARN" ] || [ -z "$EXPECTED_HASH" ]; then
            echo "::error::Could not retrieve Layer configuration from SSM. Ensure the layers stack is deployed in ${{ secrets.AWS_REGION }}."
            exit 1
          fi
          
          echo "Layer ARN: $LAYER_ARN"
          echo "Expected Hash (deployed): '$EXPECTED_HASH'"
          echo "Local Hash (backend):    '$LOCAL_HASH'"
          
          if [[ "$EXPECTED_HASH" != "$LOCAL_HASH" ]]; then
            echo "::error::Backend 'shared' folder is out of sync with the deployed Layer."
            echo "Sync action required: Deploy the 'chat-booking-layers' repository with the latest 'shared' content before deploying the backend."
            exit 1
          fi
          echo "Layer is in sync! ✅"

      - name: Validate Link SSM Params
        run: |
          ENV="${{ github.ref_name == 'main' && 'prod' || github.ref_name }}"
          REGION="${{ secrets.AWS_REGION }}"

          BUCKET=$(aws ssm get-parameter \
            --name "/chatbooking/${ENV}/link-bucket-name" \
            --query 'Parameter.Value' --output text --region "$REGION" 2>/dev/null) || true

          DIST_ID=$(aws ssm get-parameter \
            --name "/chatbooking/${ENV}/link-distribution-id" \
            --query 'Parameter.Value' --output text --region "$REGION" 2>/dev/null) || true

          if [ -z "$BUCKET" ] || [ -z "$DIST_ID" ]; then
            echo "::error::SSM params for chat-booking-link not found in env=${ENV}."
            echo "Deploy chat-booking-link before deploying the backend."
            exit 1
          fi

          echo "Link bucket:          $BUCKET"
          echo "Link distribution ID: $DIST_ID"
          echo "Link SSM params OK ✅"

      - name: Install Lambda Dependencies
        run: |
          find . -name "requirements.txt" -not -path "*/node_modules/*" -not -path "*/.venv/*" | while read req_file; do
            dir=$(dirname "$req_file")
            pip install -r "$req_file" -t "$dir"
          done

      - name: Install CDK dependencies
        working-directory: infra
        run: npm install

      - name: Build CDK app
        working-directory: infra
        run: npm run build

      - name: Deploy with CDK
        working-directory: infra
        run: |
          npx cdk deploy --all --app "node dist/bin/app.js" --require-approval never -c env=${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
        env:
          ALLOWED_IPS: ${{ vars.ALLOWED_IPS }}
          ENV: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
          API_DOMAIN_NAME: ${{ vars.API_DOMAIN_NAME }}
          MEDIA_DOMAIN_NAME: ${{ vars.MEDIA_DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          MP_ACCESS_TOKEN_PROD: ${{ secrets.MP_ACCESS_TOKEN_PROD }}
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}

      - name: Reconcile CloudFront media domain (drift fix)
        if: vars.MEDIA_DOMAIN_NAME != ''
        continue-on-error: true
        env:
          ENV: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
          MEDIA_DOMAIN_NAME: ${{ vars.MEDIA_DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          # CloudFront is a global service — its API always targets us-east-1
          CLOUDFRONT_REGION: us-east-1
        run: |
          STACK_NAME="ChatBooking-${ENV}-Assets"
          echo "Checking CloudFront distribution for stack: $STACK_NAME"

          DIST_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`AssetsDistributionDomain`].OutputValue' \
            --output text 2>/dev/null)

          if [ -z "$DIST_DOMAIN" ]; then
            echo "Could not find AssetsDistributionDomain output. Skipping."
            exit 0
          fi
          echo "Distribution domain: $DIST_DOMAIN"

          DIST_ID=$(aws cloudfront list-distributions \
            --region "$CLOUDFRONT_REGION" \
            --query "DistributionList.Items[?DomainName=='${DIST_DOMAIN}'].Id" \
            --output text 2>/dev/null)

          if [ -z "$DIST_ID" ]; then
            echo "Could not find CloudFront distribution. Skipping."
            exit 0
          fi
          echo "Distribution ID: $DIST_ID"

          RESPONSE=$(aws cloudfront get-distribution-config \
            --region "$CLOUDFRONT_REGION" \
            --id "$DIST_ID")
          ETAG=$(echo "$RESPONSE" | jq -r '.ETag')
          CURRENT_ALIASES=$(echo "$RESPONSE" | jq -r '.DistributionConfig.Aliases.Items[]?' 2>/dev/null || echo "")

          if echo "$CURRENT_ALIASES" | grep -qF "$MEDIA_DOMAIN_NAME"; then
            echo "$MEDIA_DOMAIN_NAME already configured in CloudFront. ✅"
            exit 0
          fi

          echo "Adding $MEDIA_DOMAIN_NAME to distribution $DIST_ID..."

          UPDATED_CONFIG=$(echo "$RESPONSE" | jq --arg domain "$MEDIA_DOMAIN_NAME" --arg cert "$CERTIFICATE_ARN" '
            .DistributionConfig |
            .Aliases.Quantity += 1 |
            .Aliases.Items += [$domain] |
            .ViewerCertificate = {
              "ACMCertificateArn": $cert,
              "SSLSupportMethod": "sni-only",
              "MinimumProtocolVersion": "TLSv1.2_2021",
              "Certificate": $cert,
              "CertificateSource": "acm"
            }
          ')

          aws cloudfront update-distribution \
            --region "$CLOUDFRONT_REGION" \
            --id "$DIST_ID" \
            --distribution-config "$UPDATED_CONFIG" \
            --if-match "$ETAG" \
            --output json | jq -r '.Distribution.Status'

          echo "CloudFront domain $MEDIA_DOMAIN_NAME associated successfully. ✅"
